name: SOL均值回归回测自动运行
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  backtest-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib

      - name: Run backtest script
        run: python sol_perp_mean_reversion_backtest.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sol_perp_mean_reversion_backtest_report.md
          git commit -m "🤖 自动生成均值回归回测报告" || true
          git push https://${{ github.token }}@github.com/${{ github.repository }}.git HEAD:main
