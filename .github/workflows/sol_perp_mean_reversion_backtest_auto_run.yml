name: SOL均值回归回测自动运行

on:
  schedule:
    - cron: '0 01 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  backtest-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：授予写入仓库权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib

      - name: Run mean reversion backtest
        run: |
          python sol_perp_mean_reversion_backtest.py

      - name: Commit and push report
        run: |
          git add data/sol_perp_mean_reversion_backtest_report.md
          git commit -m "🤖 Auto update mean reversion backtest report" || true
          git push
