name: Daily SOL Perp Data Update

on:
  schedule:
    - cron: '30 0 * * *'     # 北京时间 08:30
    - cron: '30 12 * * *'    # 北京时间 20:30
  workflow_dispatch:         # 支持手动触发
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 创建数据目录
        run: mkdir -p data

      - name: 运行数据采集脚本
        run: python data_collector.py

      - name: 提交最新数据文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "没有数据变化，跳过提交"
          else
            git commit -m "📊 Auto update SOL perp data - $(date '+%Y-%m-%d %H:%M:%S' -u)"
            git push
          fi
